<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão — AgendaAqui</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0057FF" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #0f172a; padding: 24px; }
    .card { max-width: 420px; text-align: center; background: white; border-radius: 20px; padding: 40px 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
    .icon { width: 72px; height: 72px; margin: 0 auto 16px; border-radius: 20px; background: linear-gradient(135deg,#0057FF,#003BB5); display:flex; align-items:center; justify-content:center; color:white; font-size:36px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 20px; color: #475569; font-size: 15px; line-height: 1.5; }
    button { background:#0057FF; color:white; border:0; padding: 12px 22px; border-radius: 12px; font-weight:600; cursor:pointer; font-size:15px; }
    button:hover { background:#003BB5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📍</div>
    <h1>Você está offline</h1>
    <p>Não foi possível carregar esta página. Verifique sua conexão com a internet e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
